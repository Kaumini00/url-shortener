<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ui-grid">
    <header class="app-header">
      <div class="logo">
        <span>🚀</span>
        <div>
          <h1>URL Shortener</h1>
          <!-- <p>High-speed compact links, now in sleek dark UI.</p> -->
        </div>
      </div>
      <!-- <small>Fast API + SQLite | click tracking included</small> -->
    </header>

    <section class="app-panel">
      <div class="section-title"><h2>Create link</h2></div>
      <div class="input-group">
        <input id="inputUrl" type="url" placeholder="https://example.com/long-url" autocomplete="off" />
        <button id="buttonShorten" class="primary">Shorten</button>
      </div>
      <div id="result" class="toast"></div>
    </section>

    <section class="app-panel">
      <div class="section-title"><h2>Recent Short Links</h2></div>
      <ul id="recent" class="recent"></ul>
    </section>
  </div>

  <script>
    const input = document.getElementById('inputUrl');
    const button = document.getElementById('buttonShorten');
    const result = document.getElementById('result');
    const recent = document.getElementById('recent');

    function renderMessage(text, type = 'info') {
      result.textContent = text;
      result.className = 'toast ' + type;
    }

    async function fetchLinks() {
      try {
        const resp = await fetch('/links');
        if (!resp.ok) throw new Error('Fetch failed');

        const data = await resp.json();
        if (!data.length) {
          recent.innerHTML = '<li class="empty">No links yet. Create one above.</li>';
          return;
        }

        recent.innerHTML = data.map(item => `
          <li>
            <div class="item-top">
              <a target="_blank" href="${item.shortUrl}">${item.shortUrl}</a>
              <span class="tag">${item.clickCount} clicks</span>
            </div>
            <p class="original">${item.originalUrl}</p>
            <small>created: ${new Date(item.createdAtUtc).toLocaleString()}</small>
          </li>
        `).join('');
      } catch (err) {
        recent.innerHTML = '<li class="empty error">Unable to load links</li>';
      }
    }

    async function shorten() {
      const url = input.value.trim();
      if (!url) return renderMessage('Enter a website URL first', 'error');

      try {
        const resp = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const payload = await resp.json();

        if (!resp.ok) {
          return renderMessage(payload.error || 'Could not shorten URL', 'error');
        }

        renderMessage(`Short URL: ${payload.shortUrl}`, 'success');
        input.value = '';
        fetchLinks();
      } catch (err) {
        renderMessage('Network error while contacting API', 'error');
      }
    }

    button.addEventListener('click', shorten);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') shorten();
    });

    window.addEventListener('DOMContentLoaded', fetchLinks);
  </script>
</body>
</html>
